services:
  pubsub:
    image: google/cloud-sdk:latest
    container_name: webhook-pubsub
    command: >
      gcloud beta emulators pubsub start
        --project=test-project
        --host-port=0.0.0.0:8085
    environment:
      JAVA_TOOL_OPTIONS: "-Djava.util.logging.config.file=/tmp/logging.properties -Dio.netty.leakDetection.level=DISABLED"
    ports:
      - "8085:8085"
    volumes:
      - ./infra/logging.properties:/tmp/logging.properties:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8085)); s.close()"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s
    networks:
      - local-dev

  firestore:
    image: google/cloud-sdk:latest
    container_name: webhook-firestore
    command: >
      gcloud beta emulators firestore start
        --host-port=0.0.0.0:8556
    environment:
      JAVA_TOOL_OPTIONS: "-Djava.util.logging.config.file=/tmp/logging.properties -Dio.netty.leakDetection.level=DISABLED"
    ports:
      - "8556:8556"
    volumes:
      - ./infra/logging.properties:/tmp/logging.properties:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8556)); s.close()"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s
    networks:
      - local-dev

  webhook:
    build: .
    container_name: webhook-app
    env_file:
      - .env
    environment:
      ENVIRONMENT: local
      PUBSUB_EMULATOR_HOST: pubsub:8085
      FIRESTORE_EMULATOR_HOST: firestore:8556
      GCP_PROJECT_ID: test-project
      WATCH_FOLDER_LOCAL: /data
      DRIVE_WEBHOOK_URL: http://localhost:8080/drive/updated
      TOPIC_BLUEPRINT_PUSH_URL: http://workshop-app:8000/blueprints/files-updated
      TRELLO_WEBHOOK_URL: http://localhost:8080/trello/updated
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - ../watched:/data
    depends_on:
      pubsub:
        condition: service_healthy
      firestore:
        condition: service_healthy
    networks:
      - local-dev
    command: >
      uvicorn webhook.main:app
        --host 0.0.0.0
        --port 8080
        --reload

networks:
  local-dev:
    name: aibiz-local-dev
