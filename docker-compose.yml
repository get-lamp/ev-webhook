services:
  nats:
    image: nats:alpine
    container_name: webhook-nats
    command: "--js"
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    networks:
      - local-dev

  firestore:
    image: google/cloud-sdk:latest
    container_name: webhook-firestore
    command: >
      gcloud beta emulators firestore start
        --host-port=0.0.0.0:8556
    environment:
      JAVA_TOOL_OPTIONS: "-Djava.util.logging.config.file=/tmp/logging.properties -Dio.netty.leakDetection.level=DISABLED"
    ports:
      - "8556:8556"
    volumes:
      - ./infra/logging.properties:/tmp/logging.properties:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8556)); s.close()"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s
    networks:
      - local-dev

  webhook:
    build: .
    container_name: webhook-app
    env_file:
      - .env
    environment:
      ENVIRONMENT: local
      NATS_URL: nats://nats:4222
      FIRESTORE_EMULATOR_HOST: firestore:8556
      WATCH_FOLDER_LOCAL: /blueprints
      TOPIC_BLUEPRINT_PUSH_URL: http://workshop-app:8000/blueprints/files-updated
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - ../_blueprints:/blueprints
      - ../_parts:/parts
    depends_on:
      nats:
        condition: service_healthy
      firestore:
        condition: service_healthy
    networks:
      - local-dev
    command: >
      uvicorn webhook.main:app
        --host 0.0.0.0
        --port 8080
        --reload

networks:
  local-dev:
    name: aibiz-local-dev
